<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geni — Personal AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">✦</div>
        <div class="brand-text">
          <span class="brand-name">Geni</span>
          <span class="brand-sub">Asisten Produktivitas</span>
        </div>
      </div>

      <button type="button" id="new-chat" class="new-chat">+ Mulai obrolan baru</button>

      <div class="history-label">Terakhir</div>
      <div class="history" id="history">
        <div class="history-empty">Belum ada percakapan</div>
      </div>

      <div class="user">
        <div class="user-avatar">LH</div>
        <span class="user-name">Lukman Hakim</span>
      </div>
    </aside>

    <!-- ============ MAIN ============ -->
    <main class="chat">
      <!-- header -->
      <header class="chat-header">
        <div class="chat-header-mark">✦</div>
        <div class="chat-header-text">
          <div class="chat-header-title">Halo, Lukman 👋</div>
          <div class="chat-header-sub">Aku bantu rapikan tulisan kerjamu</div>
        </div>
        <div class="tone" id="tone" role="tablist" aria-label="Nada tulisan">
          <button type="button" class="tone-btn active" data-tone="formal">Formal</button>
          <button type="button" class="tone-btn" data-tone="semi-formal">Semi</button>
          <button type="button" class="tone-btn" data-tone="santai">Santai</button>
        </div>
      </header>

      <!-- messages -->
      <div id="chat-box" class="chat-box">
        <!-- welcome / empty state (dihapus saat pesan pertama dikirim) -->
        <div class="welcome" id="welcome">
          <div class="welcome-mark">✦</div>
          <h1 class="welcome-title">Halo, Lukman! 👋</h1>
          <p class="welcome-sub">Mau nulis apa hari ini? Pilih salah satu di bawah atau ketik langsung.</p>
          <div class="welcome-chips">
            <button type="button" class="chip" data-prompt="Tolong buatkan draft email untuk ">✉ Buat email</button>
            <button type="button" class="chip" data-prompt="Tolong ringkas teks berikut: ">✦ Ringkas teks</button>
            <button type="button" class="chip" data-prompt="Ubah nada pesan ini menjadi lebih sopan: ">↻ Ubah nada</button>
            <button type="button" class="chip" data-prompt="Bantu saya membalas pesan ini: ">💬 Balas pesan</button>
            <button type="button" class="chip chip-file" data-accept="application/pdf,.pdf" data-prompt="Tolong ringkas dokumen yang saya lampirkan menjadi poin-poin penting.">Ringkas dokumen</button>
            <button type="button" class="chip chip-file" data-accept="image/*" data-prompt="Tolong bantu saya membalas pesan pada screenshot yang saya lampirkan.">Balas screenshot</button>
            <button type="button" class="chip chip-file" data-accept="audio/*" data-prompt="Tolong ubah voice note yang saya lampirkan menjadi pesan tertulis yang rapi.">Voice note → pesan</button>
          </div>
        </div>
      </div>

      <!-- composer -->
      <footer class="composer">
        <div class="quick-chips" id="quick-chips">
          <button type="button" class="chip chip-sm" data-prompt="Tolong buatkan draft email untuk ">✉ Buat email</button>
          <button type="button" class="chip chip-sm" data-prompt="Tolong ringkas teks berikut: ">✦ Ringkas</button>
          <button type="button" class="chip chip-sm" data-prompt="Ubah nada tulisan ini: ">↻ Ubah nada</button>
          <button type="button" class="chip chip-sm chip-file" data-accept="application/pdf,.pdf" data-prompt="Tolong ringkas dokumen yang saya lampirkan menjadi poin-poin penting.">Ringkas dokumen</button>
          <button type="button" class="chip chip-sm chip-file" data-accept="image/*" data-prompt="Tolong bantu saya membalas pesan pada screenshot yang saya lampirkan.">Balas screenshot</button>
          <button type="button" class="chip chip-sm chip-file" data-accept="audio/*" data-prompt="Tolong ubah voice note yang saya lampirkan menjadi pesan tertulis yang rapi.">Voice note → pesan</button>
        </div>

        <!-- preview lampiran (v2) -->
        <div class="attachment" id="attachment" hidden>
          <div class="attachment-inner">
            <div class="attachment-thumb" id="attachment-thumb"></div>
            <span class="attachment-name" id="attachment-name"></span>
            <button type="button" class="attachment-remove" id="attachment-remove" aria-label="Hapus lampiran">✕</button>
          </div>
        </div>

        <!-- error validasi lampiran (v2) -->
        <div class="composer-error" id="composer-error" role="alert" hidden>
          <span class="composer-error-box" id="composer-error-text"></span>
        </div>

        <form id="chat-form" class="input-row">
          <button type="button" id="attach-btn" class="attach" aria-label="Lampirkan file">📎</button>
          <input type="file" id="file-input" hidden accept="image/*,application/pdf,audio/*" aria-hidden="true" tabindex="-1" />
          <input type="text" id="user-input" placeholder="Tulis sesuatu…" autocomplete="off" />
          <button type="submit" id="send-btn" class="send" aria-label="Kirim">➤</button>
        </form>
      </footer>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
